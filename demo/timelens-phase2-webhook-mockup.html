<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TimeLens 二期 · Webhook 推送（效果图）</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="timelens-phase2-theme.css" />
</head>
<body>
  <div class="p2-outer">
    <nav class="p2-nav" aria-label="导航">
      <a href="timelens-phase2-index.html" class="p2-nav-brand">Phase 2</a>
      <a href="timelens-phase2-index.html">索引</a>
      <span style="color:var(--line)">·</span>
      <span class="p2-nav-here">Webhook</span>
      <span style="color:var(--line)">·</span>
      <a href="timelens-phase2-recap-mockup.html">日终复盘</a>
    </nav>

    <div class="p2-window">
      <div class="p2-titlebar">
        <div class="p2-dots"><span></span><span></span><span></span></div>
        <div class="p2-titlebar-title">集成 · 日报摘要推送</div>
      </div>
      <div class="p2-body">
        <div class="p2-badge-row">
          <span class="p2-badge p1">P1</span>
          <span class="p2-badge hot">独立授权</span>
        </div>
        <h1 class="p2-h1">把日终复盘摘要推到 IM</h1>
        <p class="p2-lead">用户<strong>主动配置</strong> Webhook URL（如飞书机器人）。仅推送<strong>已生成的摘要</strong>，不默认开启；速率与重试策略实现期定义。</p>

        <div class="p2-card">
          <h2>推送开关</h2>
          <div class="p2-row">
            <div class="p2-label">启用 Webhook 推送<small>每日生成成功后 POST 一次</small></div>
            <div class="p2-toggle on" aria-hidden="true"></div>
          </div>
        </div>

        <div class="p2-card">
          <h2>Webhook URL</h2>
          <input class="p2-input" type="url" readonly value="https://open.feishu.cn/open-apis/bot/v2/hook/········" style="max-width:100%;" />
          <p style="margin-top:0.65rem;font-size:0.75rem;color:var(--muted);">URL 仅存本地加密存储；示意图非真实地址。</p>
        </div>

        <div class="p2-card">
          <h2>载荷示例（JSON · 示意）</h2>
          <textarea class="p2-textarea" readonly style="min-height:140px;">{
  "event": "timelens.daily_recap.ready",
  "date": "2026-03-31",
  "summary_md": "## 总览\n今天下午为交叉工作流…\n## 切换\nVS Code↔Chrome 85 次…",
  "stats": {
    "switch_count": 187,
    "deep_segments": 2,
    "top_clipboard_edge": "Chrome→VS Code"
  },
  "app": { "name": "TimeLens", "version": "0.x" }
}</textarea>
        </div>

        <button type="button" class="p2-btn">保存并测试发送</button>
        <button type="button" class="p2-btn p2-btn-ghost" style="margin-left:0.5rem;">清除 URL</button>

        <p class="p2-foot">
          <strong>PRD §4.2：</strong>Webhook 为 P1；与「零默认外传」一致，须与总开关/用户明确操作绑定。
        </p>
      </div>
    </div>
    <p class="p2-page-foot">Phase 2 · webhook mockup</p>
  </div>
</body>
</html>
