<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V10 明天视角 · TimeLens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Syne:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="timelens-phase3-poster-shared.css" />
  <style>
    .wrap { max-width: 520px; margin: 0 auto; }
    .card {
      border-radius: 18px;
      border: 1px solid var(--line);
      padding: 1.5rem 1.35rem;
      background: linear-gradient(145deg, rgba(139,126,207,0.12), rgba(12,11,9,0.9));
      margin-bottom: 1.25rem;
    }
    .eyebrow {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--c-meet);
      margin-bottom: 0.65rem;
    }
    h1 {
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.45;
      margin-bottom: 1rem;
    }
    h1 em { font-style: normal; color: var(--accent); }
    .fact {
      font-size: 0.85rem;
      color: rgba(242,235,227,0.9);
      line-height: 1.65;
      padding: 0.85rem 1rem;
      background: rgba(0,0,0,0.25);
      border-radius: 10px;
      border-left: 3px solid var(--c-meet);
    }
    .fact strong { color: var(--accent-2); }
    .btn {
      width: 100%;
      padding: 0.9rem;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      background: var(--c-meet);
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="p3-page wrap">
    <span class="p3-demo-badge">V10 · 未来导向叙事</span>
    <div class="card">
      <p class="eyebrow">TOMORROW LENS · 演示</p>
      <h1>若你明天想<strong>少被会议切碎</strong>，今天这条数已经<strong>提前告状</strong>。</h1>
      <p class="fact">
        模拟数据中，<strong>会议沟通占前台 28%</strong>— 接近三成。这不是审判，是排期时的<strong>谈判筹码</strong>：你知道自己「被拉走」的底盘有多大，再决定下周哪些会可以挡、哪些可以缩。
      </p>
    </div>
    <p style="font-size:0.78rem;color:var(--muted);margin-bottom:1rem;">同一套数据也可换成「想多写代码」视角，只需改外框文案。</p>
    <button type="button" class="btn">回到今天：看完整结构</button>
    <p class="p3-back"><a href="timelens-phase3-poster-gallery.html">← 方案库</a></p>
  </div>
</body>
</html>
