name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: project/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: project/src-tauri

      - name: Install frontend dependencies
        working-directory: project
        run: npm ci

      - name: Build Tauri app
        working-directory: project
        run: npm run tauri build

      - name: Upload Windows installer (NSIS)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: TimeLens-windows-x64-installer
          path: project/src-tauri/target/release/bundle/nsis/*-setup.exe

      - name: Upload Windows portable (exe)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: TimeLens-windows-x64-portable
          path: project/src-tauri/target/release/TimeLens.exe

      - name: Upload macOS DMG
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: TimeLens-macos-dmg
          path: project/src-tauri/target/release/bundle/dmg/*.dmg

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TimeLens ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/TimeLens-windows-x64-installer/*.exe
            artifacts/TimeLens-windows-x64-portable/TimeLens.exe
            artifacts/TimeLens-macos-dmg/*.dmg
